<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Annapurna Conch Store</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .header { text-align: center; color: #800020; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; text-align: center; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 10px; }
        .price { font-size: 1.2em; font-weight: bold; color: #e74c3c; margin: 10px 0; }
        .btn-buy { background: #800020; color: white; border: none; padding: 12px 20px; border-radius: 25px; width: 100%; cursor: pointer; font-weight: bold; }
        .back-link { display: block; text-align: center; margin-top: 30px; color: #800020; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="header">আমাদের কালেকশন / Our Collection</h2>
    
    <div class="grid">
        <!-- ১. বাঁশি শঙ্খ -->
        <div class="card">
            <img src="images/product1.jpg" alt="Banshi Shankha">
            <h3>বাঁশি শঙ্খ / Banshi Shankha</h3>
            <p class="price">Price: ₹149</p>
            <button class="btn-buy" onclick="location.href='order.html?product=Banshi-Shankha&price=149'">অর্ডার করুন / Order Now</button>
        </div>

        <!-- ২. পুজোর শঙ্খ -->
        <div class="card">
            <img src="images/product2.jpg" alt="Pujor Shankha">
            <h3>পুজোর শঙ্খ / Puja Shankha</h3>
            <p class="price">Price: ₹1199</p>
            <button class="btn-buy" onclick="location.href='order.html?product=Pujor-Shankha&price=1199'">অর্ডার করুন / Order Now</button>
        </div>

        <!-- ৩. ডিজাইনার শাখা -->
        <div class="card">
            <img src="images/product3.jpg" alt="Designer Shakha">
            <h3>ডিজাইনার শাখা / Designer Shakha</h3>
            <p class="price">Price: ₹499</p>
            <button class="btn-buy" onclick="location.href='order.html?product=Designer-Shakha&price=499'">অর্ডার করুন / Order Now</button>
        </div>

        <!-- ৪. প্রিমিয়াম শাখা -->
        <div class="card">
            <img src="images/product4.jpg" alt="Premium Shakha">
            <h3>প্রিমিয়াম শাখা / Premium Shakha</h3>
            <p class="price">Price: ₹799</p>
            <button class="btn-buy" onclick="location.href='order.html?product=Premium-Shakha&price=799'">অর্ডার করুন / Order Now</button>
        </div>
    </div>

    <a href="index.html" class="back-link">← হোম পেজে ফিরে যান / Back to Home</a>
</div>

</body>
</html>
